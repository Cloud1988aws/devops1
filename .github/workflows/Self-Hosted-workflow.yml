# This is a basic workflow to help you get started with Actions

name: Self-Hosted-workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" , "raju1" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  app_build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Kill old Flask
        run: pkill -f app.py || true

      - name: Set up Python and venv
        run: |
          cd $GITHUB_WORKSPACE
          python3 -m venv myenv
          myenv/bin/pip install --upgrade pip
          myenv/bin/pip install -r requirements.txt

      - name: Run Flask in Background
        run: |
          cd $GITHUB_WORKSPACE
          nohup myenv/bin/python app.py > flask.log 2>&1 &

      - name: Keep Workflow Running
        run: |
          echo "Workflow will run continuously. Cancel manually to stop."
          tail -f flask.log
